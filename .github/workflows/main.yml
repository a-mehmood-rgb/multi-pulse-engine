name: Ghost Engine Payout
on:
  schedule:
    - cron: '*/35 * * * *' # Runs every 35 minutes for stealth
  workflow_dispatch:      # Allows you to click "Run" manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Ghost Engine
        env:
          FP_EMAIL: ${{ secrets.FP_EMAIL }}
          FP_API_KEY: ${{ secrets.FP_API_KEY }}
        run: python pulse.py
