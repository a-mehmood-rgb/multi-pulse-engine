name: Multi-Grid-Pulse-2026

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes
  workflow_dispatch:       # Manual trigger button

jobs:
  pulse:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false      # Keeps Windows running even if Ubuntu hits a temporary IP block
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Stealth Tools
        # This version checks for the file first. If it's missing, it installs directly!
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi || echo "Direct install fallback"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Engine
        env:
          FP_EMAIL: ${{ secrets.FP_EMAIL }}
          FP_API_KEY: ${{ secrets.FP_API_KEY }}
        # We use 'python -u' to see logs in REAL-TIME without waiting
        run: python -u pulse.py
