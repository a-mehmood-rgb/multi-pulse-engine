name: Ghost Engine Pulse

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 mins
  workflow_dispatch:      # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install curl_cffi termcolor

      - name: Run Pulse Script
        env:
          MAIL: ${{ secrets.MAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          FP_API_KEY: ${{ secrets.FP_API_KEY }}
          FP_EMAIL: ${{ secrets.FP_EMAIL }}
        run: python pulse.py
