name: Ghoskk

on:
  schedule:
    # Runs every 2 hours at a random minute to avoid detection
    - cron: '45 */2 * * *' 
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  auto-payout:
    runs-on: ubuntu-latest
    
    # Setting a hard limit of 30 minutes to stay within "Free Tier" safety
    timeout-minutes: 30 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Execute Dynamic Pulse
        env:
          # These must be set in your GitHub Repo Settings > Secrets
          FP_API_KEY: ${{ secrets.FP_API_KEY }}
          WALLET_ADDR: ${{ secrets.WALLET_ADDR }}
        run: python pulse.py
